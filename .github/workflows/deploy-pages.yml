# Deploy whitepaper (static HTML) and demo directories to GitHub Pages
#
# As of May 2026, whitepaper/ is hand-written static HTML (no Jekyll). See
# whitepaper/README.md and whitepaper/DESIGN_NOTES.md for the design rationale.
# This workflow just stages the right files into _site/ and lets GitHub Pages
# serve them as-is — .nojekyll is added so Pages doesn't try to re-process them.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'whitepaper/**'
      - 'demo/**'
      - 'spec/README.md'
      - 'docs/BUILDING_ON_WEB_AGENTS_API.md'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site

          # 1. whitepaper/ is the static-HTML site root. Copy everything except
          #    historical/internal artifacts that don't need to be served.
          rsync -a \
            --exclude 'README.md' \
            --exclude 'DESIGN_NOTES.md' \
            --exclude 'CLAUDE_DESIGN_PROMPT.md' \
            --exclude 'PROMPT_FOR_EXTERNAL_MOZILLA_INTELLIGENCE.md' \
            --exclude 'design-bundle/' \
            whitepaper/ _site/

          # 2. Demo pages (live demos linked from the site).
          rsync -a \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'node_modules/' \
            demo/ _site/demo/

          # 3. Selected docs published alongside the site so the in-page
          #    "BUILDING_ON_WEB_AGENTS_API" link and the spec README work
          #    when read off the Pages URL too.
          mkdir -p _site/docs _site/spec
          cp docs/BUILDING_ON_WEB_AGENTS_API.md _site/docs/
          cp spec/README.md _site/spec/

          # 4. Belt-and-braces: ensure GitHub Pages serves files exactly as
          #    written. whitepaper/.nojekyll already covers this, but rsync's
          #    excludes can hide dotfiles depending on glob settings, so we
          #    re-touch it here as a guarantee.
          touch _site/.nojekyll

          # Sanity output for the action log.
          ls -la _site/
          echo "---"
          ls -la _site/docs/ _site/spec/ _site/demo/ | head -40

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
